session = "$SESSION_NAME"
tmux_bin = "${pkgs.tmux}/bin/tmux"
hook_session_closed = "run-shell 'nix run ${flakeRef}#dev-stop'"
focus = "backend"

[env]
DEV_CMD = "$DEV_CMD"
BIND_IP = "${BIND_IP}"
COMPOSE_PROJECT_NAME = "$COMPOSE_PROJECT_NAME"

[[tasks]]
id = "backend"
pane = "root"
cmd = "$DEV_CMD make start-backend-dev"

[[tasks]]
id = "repl"
pane = "right_of:backend"
depends_on = ["backend"]
cmd = """
$DEV_CMD make -C backend repl NREPL_HOST='${BIND_IP}'
(go)
"""

[[tasks]]
id = "frontend"
pane = "down_of:backend"
depends_on = ["backend"]
cmd = "$DEV_CMD ${devFrontend}"

[[tasks]]
id = "kintone_js"
pane = "down_of:frontend"
depends_on = ["frontend"]
cmd = "$DEV_CMD ${devKintoneJs}"

[[tasks]]
id = "compose"
pane = "down_of:repl"
depends_on = ["repl"]
cmd = "env UID=$(id -u) GID=$(id -g) HOST_IP='${BIND_IP}' ${pkgs.docker-compose}/bin/docker-compose -p $COMPOSE_PROJECT_NAME up"
